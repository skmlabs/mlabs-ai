name: CI
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Placeholder values — CI does not hit real Supabase or Google. The app
      # needs these to exist at build + start time; runtime auth calls in tests
      # fall through to the unauthenticated path (no session cookie).
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
      NEXT_PUBLIC_APP_URL: "https://local.mlabsdigital.org"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder"
      ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      GOOGLE_OAUTH_CLIENT_ID: "placeholder"
      GOOGLE_OAUTH_CLIENT_SECRET: "placeholder"
      GOOGLE_MAPS_API_KEY: "placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:unit
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
